<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save the Date — Yeng & Adam · May 1st, 2027</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --green: #1a4a2e;
      --green-mid: #2a5c3a;
      --green-light: #4a7a58;
      --card-bg: #c8c4b0; /* fallback if letter.jpg absent */
    }

    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: url('assets/background.jpg') center center / cover fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(30, 48, 28, 0.38);
      pointer-events: none;
      z-index: 0;
    }

    .page-content { position: relative; z-index: 1; }

    /* ── Shared letter card ── */
    .letter-card {
      background: url("assets/letter.jpg") center center / 100% 100% no-repeat, var(--card-bg);
      border: none;
      border-radius: 4px;
      position: relative;
      text-align: center;
      container-type: inline-size;
    }

    /* ══════════════════════════════════════
       SVG EMBOSSED BORDER (drawn in JS)
       Sits as an absolutely-positioned layer
       ══════════════════════════════════════ */
    .hero .letter-card svg.emboss-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .hero-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 720px;
    }

    .hero .letter-card {
      width: min(100%, calc(90vh * 15 / 21));
      aspect-ratio: 15 / 21;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Hero card inner content ── */
    .hero-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 9cqi 10cqi;
    }

    .hero-to {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 5.2cqi;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.55em;
    }

    .hero-save-the-date {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 5.2cqi;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.55em;
    }

    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 3.4cqi;
      color: var(--green-mid);
      letter-spacing: 0.04em;
      margin-bottom: 1.4em;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 5.2cqi;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      line-height: 1.15;
    }

    .hero-and {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 2.3cqi;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--green-mid);
      margin: 0.55em 0;
    }

    .hero-rule-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 62%;
      margin: 1.4em auto 0;
    }
    .hero-rule { width: 100%; height: 0.5px; background: var(--green); opacity: 0.45; }

    .hero-date {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 3.1cqi;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--green);
      padding: 0.6em 0;
    }

    .hero-venue {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 3.7cqi;
      color: var(--green-mid);
      margin-top: 1em;
      letter-spacing: 0.04em;
    }

    .scroll-hint {
      margin-top: 1.4rem;
      display: flex; flex-direction: column; align-items: center;
      color: #f0ede6;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .scroll-arrow {
      width: 12px; height: 12px;
      border-right: 1px solid #f0ede6;
      border-bottom: 1px solid #f0ede6;
      transform: rotate(45deg);
      animation: bounce 1.6s ease infinite;
    }

    /* ── RSVP section ── */
    .rsvp-section {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 4rem 1.5rem;
    }

    .rsvp-section .letter-card {
      width: min(100%, calc(90vh * 15 / 21));
      aspect-ratio: 15 / 21;
      padding: 7cqi 8cqi 6cqi;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    .rsvp-section .letter-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .rsvp-section .letter-card.hidden {
      opacity: 0;
      transform: translateY(40px);
    }

    .rsvp-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 5.2cqi;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.3rem;
    }
    .rsvp-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 3.4cqi;
      color: var(--green-mid);
      letter-spacing: 0.04em;
      margin-bottom: 1.6rem;
    }

    .form-inner { width: 68%; }

    .field-group { margin-bottom: 1.2rem; text-align: left; }
    .field-group label {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1cqi;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 0.4cqi;
    }
    .field-group input, .field-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.55);
      border: 0.5px solid rgba(100,140,70,0.45);
      border-radius: 2px;
      padding: 1cqi 1.2cqi;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5cqi;
      color: var(--green);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }
    .field-group input::placeholder, .field-group textarea::placeholder { color: rgba(80,110,55,0.35); }
    .field-group input:focus, .field-group textarea:focus {
      border-color: rgba(100,140,70,0.8);
      background: rgba(255,255,255,0.8);
    }

    .submit-btn {
      width: 100%; margin-top: 0.4rem; padding: 1.1cqi;
      background: rgba(42, 92, 58, 1);
      border: none;
      border-radius: 2px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1cqi;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #f0ede6;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: rgba(26, 74, 46, 1); }
    .submit-btn:disabled { opacity: 0.45; cursor: default; }

    #formState { width: 100%; display: flex; flex-direction: column; align-items: center; }
    .status-msg { margin-top: 1rem; font-size: 11px; letter-spacing: 1px; min-height: 16px; color: #5a7a40; }

    .success-state { display: none; flex-direction: column; align-items: center; gap: 0.9rem; padding: 0.5rem 0; }
    .success-icon { width: 44px; height: 44px; border: 0.5px solid #8aaa62; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #5a7a45; font-size: 20px; }
    .success-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: #2c3e22; }
    .success-sub { font-size: 11px; letter-spacing: 1.5px; color: #4a6038; }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(5px); }
    }
  </style>
</head>
<body>
  <div class="page-content">

    <!-- ── Hero ── -->
    <section class="hero">
      <div class="hero-wrap">
        <div class="letter-card" id="heroCard">

          <!-- SVG embossed frame injected by JS -->

          <div class="hero-inner">
            <div class="hero-to" id="hero-to"></div>
            <div class="hero-save-the-date">Save the Date</div>
            <div class="hero-subtitle">to celebrate the wedding of</div>

            <div class="hero-name">Yeng Lan Kwok</div>
            <div class="hero-and">and</div>
            <div class="hero-name">Kaifeng Adam Wang</div>

            <div class="hero-rule-group">
              <div class="hero-rule"></div>
              <div class="hero-date">May 1, 2027</div>
              <div class="hero-rule"></div>
            </div>

            <div class="hero-venue">Chicago, Illinois</div>
          </div>
        </div>
        <div class="scroll-hint">
          <div class="scroll-arrow"></div>
        </div>
      </div>
    </section>

    <!-- ── Address form ── -->
    <section class="rsvp-section">
      <div class="letter-card" id="rsvpCard">

        <div id="formState">
          <div class="rsvp-title">Share your address</div>
          <div class="rsvp-subtitle">so we can send your formal invitation</div>

          <div class="form-inner">
            <div class="field-group">
              <label for="partyName">Party name</label>
              <input type="text" id="partyName" placeholder="e.g. The Johnson Family" />
            </div>
            <div class="field-group">
              <label for="mailingAddress">Mailing address</label>
              <textarea id="mailingAddress" rows="3" placeholder="Street, City, State, ZIP"></textarea>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Submit ✦</button>
            <div class="status-msg" id="statusMsg"></div>
          </div>
        </div>

        <div class="success-state" id="successState">
          <div class="success-icon">✦</div>
          <div class="success-title">Thank you!</div>
          <div class="success-sub">We'll be in touch with your formal invitation.</div>
          <div class="divider" style="margin:0.5rem auto;max-width:180px;"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
          <div style="font-size:11px;color:#6a8050;letter-spacing:1px;">Yeng &amp; Adam</div>
        </div>

      </div>
    </section>

  </div>

  <script>
    // ── Embossed SVG border frame ──────────────────────────────────────────────
    (function() {
      var card = document.getElementById('heroCard');
      var ns = 'http://www.w3.org/2000/svg';

      var svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('class', 'emboss-frame');
      svg.setAttribute('viewBox', '0 0 300 420');
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.setAttribute('xmlns', ns);

      // Emboss filter: gives the raised/pressed look
      var defs = document.createElementNS(ns, 'defs');
      defs.innerHTML = `
        <filter id="emboss" x="-5%" y="-5%" width="110%" height="110%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
          <feOffset dx="-0.8" dy="-0.8" in="blur" result="shadow"/>
          <feOffset dx="0.8" dy="0.8" in="blur" result="highlight"/>
          <feComposite in="shadow" in2="SourceAlpha" operator="in" result="shadow2"/>
          <feComposite in="highlight" in2="SourceAlpha" operator="in" result="highlight2"/>
          <feFlood flood-color="rgba(255,255,255,0.55)" result="white"/>
          <feFlood flood-color="rgba(80,70,50,0.28)" result="dark"/>
          <feComposite in="white" in2="highlight2" operator="in" result="whiteHighlight"/>
          <feComposite in="dark" in2="shadow2" operator="in" result="darkShadow"/>
          <feMerge>
            <feMergeNode in="SourceGraphic"/>
            <feMergeNode in="darkShadow"/>
            <feMergeNode in="whiteHighlight"/>
          </feMerge>
        </filter>

        <!-- Floral corner motif -->
        <g id="floral">
          <!-- centre bloom -->
          <circle cx="0" cy="0" r="3.5" fill="none" stroke="currentColor" stroke-width="0.8"/>
          <circle cx="0" cy="0" r="1.4" fill="currentColor"/>
          <!-- petals -->
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(0)"/>
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(45)"/>
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(90)"/>
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(135)"/>
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(180)"/>
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(225)"/>
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(270)"/>
          <ellipse cx="0" cy="-6.5" rx="1.5" ry="3" fill="currentColor" transform="rotate(315)"/>
          <!-- leaves -->
          <ellipse cx="0" cy="-13" rx="2" ry="4.5" fill="currentColor" transform="rotate(30)"/>
          <ellipse cx="0" cy="-13" rx="2" ry="4.5" fill="currentColor" transform="rotate(330)"/>
          <ellipse cx="0" cy="-13" rx="2" ry="4.5" fill="currentColor" transform="rotate(90)"/>
          <ellipse cx="0" cy="-13" rx="2" ry="4.5" fill="currentColor" transform="rotate(150)"/>
          <ellipse cx="0" cy="-13" rx="2" ry="4.5" fill="currentColor" transform="rotate(210)"/>
          <ellipse cx="0" cy="-13" rx="2" ry="4.5" fill="currentColor" transform="rotate(270)"/>
        </g>
      `;
      svg.appendChild(defs);

      var color = 'rgba(180,174,152,0.75)'; // embossed linen tone — light against card
      var colorHighlight = 'rgba(210,205,188,0.9)';

      function el(tag, attrs, parent) {
        var e = document.createElementNS(ns, tag);
        Object.keys(attrs).forEach(function(k){ e.setAttribute(k, attrs[k]); });
        if (parent) parent.appendChild(e);
        return e;
      }

      var g = el('g', { filter: 'url(#emboss)', color: color }, svg);

      // ── Outer decorative border (rounded rect) ──
      el('rect', {
        x: '10', y: '10', width: '280', height: '400', rx: '22', ry: '22',
        fill: 'none', stroke: color, 'stroke-width': '1.2'
      }, g);

      // ── Inner frame (closer) ──
      el('rect', {
        x: '16', y: '16', width: '268', height: '388', rx: '18', ry: '18',
        fill: 'none', stroke: color, 'stroke-width': '0.6', 'stroke-dasharray': '0'
      }, g);

      // ── Beaded dots along top & bottom ──
      var beadY = [7, 413];
      beadY.forEach(function(by) {
        for (var bx = 60; bx <= 240; bx += 12) {
          el('circle', { cx: bx, cy: by, r: '1.5', fill: color }, g);
        }
      });

      // ── Beaded dots along left & right ──
      var beadX = [7, 293];
      beadX.forEach(function(bx) {
        for (var by = 60; by <= 360; by += 12) {
          el('circle', { cx: bx, cy: by, r: '1.5', fill: color }, g);
        }
      });

      // ── Corner scrollwork (top-left, mirrored) ──
      // top-left
      var scrolls = [
        // path, transform
        ['M 10,42 Q 10,22 22,16 Q 30,12 42,10', 'translate(0,0)'],  // outer arc
      ];

      function drawCornerScroll(gEl, tx, ty, scaleX, scaleY) {
        var cg = el('g', { transform: 'translate('+tx+','+ty+') scale('+scaleX+','+scaleY+')' }, gEl);
        // inner rounded corner connection
        el('path', {
          d: 'M 28,16 Q 16,16 16,28',
          fill: 'none', stroke: color, 'stroke-width': '1.5', 'stroke-linecap': 'round'
        }, cg);
        // scroll flourish on top edge
        el('path', {
          d: 'M 42,10 Q 32,10 28,14 Q 24,18 28,22 Q 32,26 28,28',
          fill: 'none', stroke: color, 'stroke-width': '1', 'stroke-linecap': 'round'
        }, cg);
        // scroll flourish on left edge
        el('path', {
          d: 'M 10,42 Q 10,32 14,28 Q 18,24 22,28 Q 26,32 28,28',
          fill: 'none', stroke: color, 'stroke-width': '1', 'stroke-linecap': 'round'
        }, cg);
        // anchor dot
        el('circle', { cx: '28', cy: '28', r: '2.2', fill: color }, cg);
        // small dot accents
        el('circle', { cx: '28', cy: '22', r: '1.2', fill: color }, cg);
        el('circle', { cx: '22', cy: '28', r: '1.2', fill: color }, cg);
      }

      // top-left
      drawCornerScroll(g, 0, 0, 1, 1);
      // top-right
      drawCornerScroll(g, 300, 0, -1, 1);
      // bottom-left
      drawCornerScroll(g, 0, 420, 1, -1);
      // bottom-right
      drawCornerScroll(g, 300, 420, -1, -1);

      // ── Floral corner motifs ──
      function addFloral(tx, ty, rot) {
        var fg = el('g', {
          transform: 'translate('+tx+','+ty+') rotate('+rot+')',
          color: color
        }, g);
        el('use', { href: '#floral' }, fg);
      }
      addFloral(32, 32, 0);
      addFloral(268, 32, 90);
      addFloral(32, 388, 270);
      addFloral(268, 388, 180);

      card.insertBefore(svg, card.firstChild);
    })();
  </script>

  <script>
    var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwu_X-k0d39XcjXQGEW5IyghrncDPGTQk8nJByQdVVTx3MTi_WKg21HACGErGXzqKD3/exec";

    var rsvpCard = document.getElementById("rsvpCard");
    var hasBeenVisible = false;

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          hasBeenVisible = true;
          rsvpCard.classList.remove("hidden");
          rsvpCard.classList.add("visible");
        } else if (hasBeenVisible) {
          rsvpCard.classList.remove("visible");
          rsvpCard.classList.add("hidden");
        }
      });
    }, { threshold: 0.4 });
    observer.observe(rsvpCard);

    function handleSubmit() {
      var partyName = document.getElementById("partyName").value.trim();
      var mailingAddress = document.getElementById("mailingAddress").value.trim();
      var submitBtn = document.getElementById("submitBtn");
      if (!partyName) { showStatus("Please enter a party name.", true); return; }
      if (!mailingAddress) { showStatus("Please enter a mailing address.", true); return; }
      submitBtn.disabled = true;
      showStatus("Sending...", false);
      fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ partyName: partyName, mailingAddress: mailingAddress })
      })
      .then(function() {
        document.getElementById("formState").style.display = "none";
        document.getElementById("successState").style.display = "flex";
      })
      .catch(function() {
        submitBtn.disabled = false;
        showStatus("Something went wrong. Please try again.", true);
      });
    }

    function showStatus(msg, isError) {
      var el = document.getElementById("statusMsg");
      el.textContent = msg;
      el.className = "status-msg" + (isError ? " error" : "");
    }
  </script>

  <script>
    // ── CONFIG — fill these in ──────────────────────────────
    var SHEET_ID  = "1MKSzGyvsqkqM5AbEqpS9H9WwJz-3posmsl-EhCA9s5g";
    var API_KEY   = "AIzaSyDkkITiuRuMkuHpIWzHU9NhHoMqrkaJRCI";
    var SHEET_TAB = "Sheet1"; // tab name at the bottom of your sheet
    // ────────────────────────────────────────────────────────

    // ── Read ?id= from URL ──
    var guestId = new URLSearchParams(window.location.search).get("id");

    // ── Fetch guest name from Sheets API ──
    async function loadGuestName() {
      if (!guestId) return; // no id = show default names as-is

      var url = "https://sheets.googleapis.com/v4/spreadsheets/"
        + SHEET_ID
        + "/values/"
        + encodeURIComponent(SHEET_TAB + "!A:B")
        + "?key=" + API_KEY;

        try {
          var res  = await fetch(url);
          var data = await res.json();
          var rows = data.values || [];
          var match = rows.find(function(row) { return row[0] === guestId; });

          if (match && match[1]) {
            var toEl = document.getElementById("hero-to");
            toEl.textContent = "To: " + match[1];
            toEl.style.display = "block";
          }
        } catch (e) {
          console.warn("Could not load guest data:", e);
        }
    }

    loadGuestName();
  </script>
</body>
</html>
