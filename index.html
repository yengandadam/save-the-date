<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save the Date — Yeng & Adam · May 1st, 2027</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: url('assets/background.jpg') center center / cover fixed;
    }

    /* dark overlay so text stays readable */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(30, 48, 28, 0.38);
      pointer-events: none;
      z-index: 0;
    }

    .page-content { position: relative; z-index: 1; }

    /* ── Shared letter card ── */
    .letter-card {
      background: url("assets/letter.jpg") center center / 100% 100% no-repeat;
      border: none;
      border-radius: 4px;
      position: relative;
      text-align: center;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .hero-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 460px;
    }

    .hero .letter-card {
      width: 100%;
      padding: 12% 11% 10%;
    }

    .ornament { color: #5a7a45; font-size: 14px; letter-spacing: 5px; margin-bottom: 0.5rem; }
    .tag { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #6a8a50; margin-bottom: 1.2rem; }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 8vw, 54px);
      font-weight: 300;
      line-height: 1.2;
      color: #2c3e22;
    }
    .ampersand { font-style: italic; color: #7a9a58; }

    .divider { display: flex; align-items: center; gap: 10px; margin: 1.1rem auto; max-width: 260px; }
    .divider-line { flex: 1; height: 0.5px; background: #8aaa62; opacity: 0.7; }
    .divider-diamond { width: 5px; height: 5px; background: #8aaa62; transform: rotate(45deg); flex-shrink: 0; }

    .date-block {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 4.5vw, 28px);
      font-weight: 300;
      color: #2c3e22;
      letter-spacing: 2px;
      margin: 0.4rem 0 0.3rem;
    }

    .venue-section { margin-top: 1.4rem; }
    .venue-name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; font-weight: 300; color: #2c3e22; margin-bottom: 5px; }
    .venue-addr { font-size: 10px; letter-spacing: 1.5px; color: #4a6038; line-height: 2; }
    .footer-note { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #6a8050; margin-top: 1.5rem; }

    .scroll-hint {
      margin-top: 1.4rem;
      display: flex; flex-direction: column; align-items: center;
      color: #f0ede6;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .scroll-arrow {
      width: 12px; height: 12px;
      border-right: 1px solid #f0ede6;
      border-bottom: 1px solid #f0ede6;
      transform: rotate(45deg);
      animation: bounce 1.6s ease infinite;
    }

    /* ── RSVP section ── */
    .rsvp-section {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 4rem 1.5rem;
    }

    .rsvp-section .letter-card {
      max-width: 460px;
      width: 100%;
      padding: 12% 11% 10%;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    .rsvp-section .letter-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .rsvp-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: #2c3e22; margin-bottom: 0.3rem; }
    .rsvp-subtitle { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #6a8a50; margin-bottom: 1.6rem; }

    .field-group { margin-bottom: 1.2rem; text-align: left; }
    .field-group label { display: block; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #6a8a50; margin-bottom: 6px; }
    .field-group input, .field-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.55);
      border: 0.5px solid rgba(100,140,70,0.45);
      border-radius: 2px;
      padding: 10px 12px;
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      color: #2c3e22;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }
    .field-group input::placeholder, .field-group textarea::placeholder { color: rgba(80,110,55,0.4); }
    .field-group input:focus, .field-group textarea:focus {
      border-color: rgba(100,140,70,0.8);
      background: rgba(255,255,255,0.8);
    }

    .submit-btn {
      width: 100%; margin-top: 0.4rem; padding: 11px;
      background: transparent;
      border: 0.5px solid rgba(90,122,68,0.6);
      border-radius: 2px;
      font-family: 'Lato', sans-serif;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: #4a6a34;
      cursor: pointer; transition: background 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: rgba(100,140,70,0.1); }
    .submit-btn:disabled { opacity: 0.45; cursor: default; }

    .status-msg { margin-top: 1rem; font-size: 11px; letter-spacing: 1px; min-height: 16px; color: #5a7a40; }
    .status-msg.error { color: #a04030; }

    .success-state { display: none; flex-direction: column; align-items: center; gap: 0.9rem; padding: 0.5rem 0; }
    .success-icon { width: 44px; height: 44px; border: 0.5px solid #8aaa62; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #5a7a45; font-size: 20px; }
    .success-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: #2c3e22; }
    .success-sub { font-size: 11px; letter-spacing: 1.5px; color: #4a6038; }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(5px); }
    }
  </style>
</head>
<body>
  <div class="page-content">

    <!-- ── Hero ── -->
    <section class="hero">
      <div class="hero-wrap">
        <div class="letter-card">
          <div class="ornament">✦ ✦ ✦</div>
          <div class="tag">Save the Date</div>
          <div class="names">
            Yeng Lan Kwok<br>
            <span class="ampersand">&amp;</span><br>
            Kaifeng Adam Wang
          </div>
          <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
          <div class="date-block">May 1st, 2027</div>
          <div class="venue-section">
            <div class="divider" style="margin-top:1.2rem;"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
            <div class="venue-name">Chicago, Illinois</div>
          </div>
          <div class="footer-note">Formal invitation to follow</div>
        </div>
        <div class="scroll-hint">
          <div class="scroll-arrow"></div>
        </div>
      </div>
    </section>

    <!-- ── Address form ── -->
    <section class="rsvp-section">
      <div class="letter-card" id="rsvpCard">

        <div id="formState">
          <div class="rsvp-title">Share your address</div>
          <div class="rsvp-subtitle">So we can send your formal invitation</div>
          <div class="divider" style="margin:1.2rem auto;"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

          <div class="field-group">
            <label for="partyName">Party name</label>
            <input type="text" id="partyName" placeholder="e.g. The Johnson Family" />
          </div>
          <div class="field-group">
            <label for="mailingAddress">Mailing address</label>
            <textarea id="mailingAddress" rows="3" placeholder="Street, City, State, ZIP"></textarea>
          </div>

          <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Submit ✦</button>
          <div class="status-msg" id="statusMsg"></div>
        </div>

        <div class="success-state" id="successState">
          <div class="success-icon">✦</div>
          <div class="success-title">Thank you!</div>
          <div class="success-sub">We'll be in touch with your formal invitation.</div>
          <div class="divider" style="margin:0.5rem auto;max-width:180px;"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
          <div style="font-size:11px;color:#6a8050;letter-spacing:1px;">Yeng Lan &amp; Kaifeng Adam · May 1st, 2027</div>
        </div>

      </div>
    </section>

  </div>

  <script>
    // ★ Replace with your Google Apps Script Web App URL
    var SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          document.getElementById("rsvpCard").classList.add("visible");
          observer.disconnect();
        }
      });
    }, { threshold: 0.15 });
    observer.observe(document.getElementById("rsvpCard"));

    function handleSubmit() {
      var partyName = document.getElementById("partyName").value.trim();
      var mailingAddress = document.getElementById("mailingAddress").value.trim();
      var submitBtn = document.getElementById("submitBtn");
      if (!partyName) { showStatus("Please enter a party name.", true); return; }
      if (!mailingAddress) { showStatus("Please enter a mailing address.", true); return; }
      submitBtn.disabled = true;
      showStatus("Sending...", false);
      fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ partyName: partyName, mailingAddress: mailingAddress })
      })
      .then(function() {
        document.getElementById("formState").style.display = "none";
        document.getElementById("successState").style.display = "flex";
      })
      .catch(function() {
        submitBtn.disabled = false;
        showStatus("Something went wrong. Please try again.", true);
      });
    }

    function showStatus(msg, isError) {
      var el = document.getElementById("statusMsg");
      el.textContent = msg;
      el.className = "status-msg" + (isError ? " error" : "");
    }
  </script>
</body>
</html>
